services:
  web:
    build: .
    image: payments-webhook-layer:latest
    # No container_name on purpose: a fixed name is global to the Docker daemon
    # and would collide with any other checkout of this project. Compose derives
    # a unique name from the project instead (override with `docker compose -p`).
    #
    # Host port is chosen at runtime (random free port) and stored in .env.
    # Container always listens on 8000.
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DB_DIR: /data
    volumes:
      # Persist the SQLite database across container rebuilds.
      - app_db:/data
    restart: unless-stopped

volumes:
  app_db:
